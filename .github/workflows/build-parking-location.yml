name: Build ParkingLocation v1.0.8 APK

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Restore Android project
        shell: bash
        run: |
          set -euo pipefail
          cat payload_parts/part00 payload_parts/part01 payload_parts/part02 payload_parts/part03 payload_parts/part04 payload_parts/part05 payload_parts/part06 payload_parts/part07 | tr -d '\r\n' > ParkingLocationApp_payload.b64
          base64 --decode ParkingLocationApp_payload.b64 > ParkingLocationApp_payload.tar.gz
          gzip -t ParkingLocationApp_payload.tar.gz
          tar -xzf ParkingLocationApp_payload.tar.gz
          test -f ParkingLocationPayload/app/src/main/java/com/interfaceworld/parkinglocation/ParkingView.java

      - name: Apply v1.0.8 corrections
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/apply_v103.py
          python3 scripts/compile_compat_v103.py
          python3 scripts/apply_v104.py
          python3 scripts/apply_v106.py
          python3 scripts/apply_v107.py
          python3 scripts/apply_v108.py

          grep -q "versionCode 8" ParkingLocationPayload/app/build.gradle
          grep -q "versionName '1.0.8'" ParkingLocationPayload/app/build.gradle
          ! grep -q "signingConfig signingConfigs.debug" ParkingLocationPayload/app/build.gradle
          grep -q 'drawVehicleIllustration(c, i' ParkingLocationPayload/app/src/main/java/com/interfaceworld/parkinglocation/ParkingView.java
          grep -q 'drawRecentCard(c, 1, 22, 609)' ParkingLocationPayload/app/src/main/java/com/interfaceworld/parkinglocation/ParkingView.java
          grep -q 'text(c, "주차위치", 22, 30, 25' ParkingLocationPayload/app/src/main/java/com/interfaceworld/parkinglocation/ParkingView.java
          grep -q '20.5f, TEXT, true' ParkingLocationPayload/app/src/main/java/com/interfaceworld/parkinglocation/ParkingView.java
          grep -q '지하5층' ParkingLocationPayload/app/src/main/java/com/interfaceworld/parkinglocation/ParkingView.java
          grep -q 'ACTION_ACL_CONNECTED' ParkingLocationPayload/app/src/main/java/com/interfaceworld/parkinglocation/BluetoothDisconnectReceiver.java

      - name: Build unsigned release APK
        id: gradle_build
        shell: bash
        run: |
          set +e
          cd ParkingLocationPayload
          gradle --no-daemon --stacktrace clean assembleRelease > ../gradle-build.log 2>&1
          code=$?
          cd ..
          echo "$code" > gradle-exit-code.txt
          exit 0

      - name: Upload Gradle diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ParkingLocation-v1.0.8-build-log
          path: |
            gradle-build.log
            gradle-exit-code.txt
          if-no-files-found: error
          retention-days: 7

      - name: Stop on Gradle failure
        shell: bash
        run: |
          set -euo pipefail
          code="$(cat gradle-exit-code.txt)"
          if [ "$code" -ne 0 ]; then
            tail -n 180 gradle-build.log
            exit "$code"
          fi

      - name: Verify unsigned APK
        shell: bash
        run: |
          set -euo pipefail
          APK=ParkingLocationPayload/app/build/outputs/apk/release/app-release-unsigned.apk
          test -f "$APK"
          unzip -t "$APK"
          sha256sum "$APK"

      - name: Prepare Android apksigner tool
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p signing-tools
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          test -x "$APKSIGNER"
          TOOL_DIR="$(dirname "$APKSIGNER")"
          test -f "$TOOL_DIR/lib/apksigner.jar"
          cp "$TOOL_DIR/lib/apksigner.jar" signing-tools/apksigner.jar
          jar tf signing-tools/apksigner.jar | grep -q 'com/android/apksigner/ApkSignerTool.class'

      - name: Upload Android apksigner tool
        uses: actions/upload-artifact@v4
        with:
          name: Android-apksigner-tool-v108
          path: signing-tools/apksigner.jar
          if-no-files-found: error
          retention-days: 7

      - name: Upload unsigned APK
        uses: actions/upload-artifact@v4
        with:
          name: ParkingLocation-v1.0.8-unsigned-apk
          path: ParkingLocationPayload/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error
          retention-days: 30
