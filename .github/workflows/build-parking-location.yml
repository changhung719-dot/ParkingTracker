name: Build ParkingLocation v1.0.6 APK

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Restore Android project
        shell: bash
        run: |
          set -euo pipefail
          cat payload_parts/part00 payload_parts/part01 payload_parts/part02 payload_parts/part03 payload_parts/part04 payload_parts/part05 payload_parts/part06 payload_parts/part07 | tr -d '\r\n' > ParkingLocationApp_payload.b64
          base64 --decode ParkingLocationApp_payload.b64 > ParkingLocationApp_payload.tar.gz
          gzip -t ParkingLocationApp_payload.tar.gz
          tar -xzf ParkingLocationApp_payload.tar.gz
          test -f ParkingLocationPayload/app/src/main/java/com/interfaceworld/parkinglocation/ParkingView.java
          cp ParkingLocationPayload/app/src/main/res/drawable/car_seltos.png /tmp/car_seltos_original.png
          cp ParkingLocationPayload/app/src/main/res/drawable/car_g90.png /tmp/car_g90_original.png

      - name: Apply v1.0.6 corrections
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/apply_v103.py
          python3 scripts/compile_compat_v103.py
          python3 scripts/apply_v104.py
          python3 scripts/apply_v106.py

          cat > /tmp/CropCarsV106.java <<'JAVA'
          import java.awt.Graphics2D;
          import java.awt.RenderingHints;
          import java.awt.image.BufferedImage;
          import java.io.File;
          import javax.imageio.ImageIO;

          public class CropCarsV106 {
              private static void cropAndScale(String sourcePath, String targetPath,
                                               int x, int y, int width, int height,
                                               int outWidth, int outHeight) throws Exception {
                  BufferedImage source = ImageIO.read(new File(sourcePath));
                  if (source == null) throw new IllegalStateException("Cannot read " + sourcePath);
                  if (x < 0 || y < 0 || x + width > source.getWidth() || y + height > source.getHeight()) {
                      throw new IllegalArgumentException("Crop outside image: " + sourcePath);
                  }
                  BufferedImage crop = source.getSubimage(x, y, width, height);
                  BufferedImage output = new BufferedImage(outWidth, outHeight, BufferedImage.TYPE_INT_ARGB);
                  Graphics2D g = output.createGraphics();
                  g.setRenderingHint(RenderingHints.KEY_INTERPOLATION, RenderingHints.VALUE_INTERPOLATION_BICUBIC);
                  g.setRenderingHint(RenderingHints.KEY_RENDERING, RenderingHints.VALUE_RENDER_QUALITY);
                  g.setRenderingHint(RenderingHints.KEY_ANTIALIASING, RenderingHints.VALUE_ANTIALIAS_ON);
                  g.drawImage(crop, 0, 0, outWidth, outHeight, null);
                  g.dispose();
                  ImageIO.write(output, "png", new File(targetPath));
              }

              public static void main(String[] args) throws Exception {
                  cropAndScale("/tmp/car_seltos_original.png",
                          "ParkingLocationPayload/app/src/main/res/drawable/car_seltos.png",
                          125, 76, 190, 82, 380, 164);
                  cropAndScale("/tmp/car_g90_original.png",
                          "ParkingLocationPayload/app/src/main/res/drawable/car_g90.png",
                          154, 78, 170, 78, 380, 174);
              }
          }
          JAVA
          javac /tmp/CropCarsV106.java
          java -Djava.awt.headless=true -cp /tmp CropCarsV106

          grep -q "versionCode 6" ParkingLocationPayload/app/build.gradle
          grep -q "versionName '1.0.6'" ParkingLocationPayload/app/build.gradle
          ! grep -q "signingConfig signingConfigs.debug" ParkingLocationPayload/app/build.gradle
          grep -q 'drawRecentCard(c, 1, 22, 590)' ParkingLocationPayload/app/src/main/java/com/interfaceworld/parkinglocation/ParkingView.java
          grep -q 'float top = 742f' ParkingLocationPayload/app/src/main/java/com/interfaceworld/parkinglocation/ParkingView.java
          grep -q 'button(c, 22, 645, 368, 693, "설정 저장"' ParkingLocationPayload/app/src/main/java/com/interfaceworld/parkinglocation/ParkingView.java
          grep -q '지하5층' ParkingLocationPayload/app/src/main/java/com/interfaceworld/parkinglocation/ParkingView.java
          grep -q 'ACTION_ACL_CONNECTED' ParkingLocationPayload/app/src/main/java/com/interfaceworld/parkinglocation/BluetoothDisconnectReceiver.java
          file ParkingLocationPayload/app/src/main/res/drawable/car_seltos.png
          file ParkingLocationPayload/app/src/main/res/drawable/car_g90.png

      - name: Build unsigned release APK
        id: gradle_build
        shell: bash
        run: |
          set +e
          cd ParkingLocationPayload
          gradle --no-daemon --stacktrace clean assembleRelease > ../gradle-build.log 2>&1
          code=$?
          cd ..
          echo "$code" > gradle-exit-code.txt
          exit 0

      - name: Upload Gradle diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ParkingLocation-v1.0.6-build-log
          path: |
            gradle-build.log
            gradle-exit-code.txt
          if-no-files-found: error
          retention-days: 7

      - name: Stop on Gradle failure
        shell: bash
        run: |
          set -euo pipefail
          code="$(cat gradle-exit-code.txt)"
          if [ "$code" -ne 0 ]; then
            tail -n 160 gradle-build.log
            exit "$code"
          fi

      - name: Verify unsigned APK
        shell: bash
        run: |
          set -euo pipefail
          APK=ParkingLocationPayload/app/build/outputs/apk/release/app-release-unsigned.apk
          test -f "$APK"
          unzip -t "$APK"
          sha256sum "$APK"

      - name: Prepare Android apksigner tool
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p signing-tools
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          test -x "$APKSIGNER"
          TOOL_DIR="$(dirname "$APKSIGNER")"
          test -f "$TOOL_DIR/lib/apksigner.jar"
          cp "$TOOL_DIR/lib/apksigner.jar" signing-tools/apksigner.jar
          jar tf signing-tools/apksigner.jar | grep -q 'com/android/apksigner/ApkSignerTool.class'

      - name: Upload Android apksigner tool
        uses: actions/upload-artifact@v4
        with:
          name: Android-apksigner-tool-v106
          path: signing-tools/apksigner.jar
          if-no-files-found: error
          retention-days: 7

      - name: Upload unsigned APK
        uses: actions/upload-artifact@v4
        with:
          name: ParkingLocation-v1.0.6-unsigned-apk
          path: ParkingLocationPayload/app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error
          retention-days: 30
