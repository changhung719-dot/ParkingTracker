name: Diagnose ParkingLocation payload

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Reconstruct and diagnose payload
        shell: bash
        run: |
          set +e
          cat payload_parts/part00 payload_parts/part01 payload_parts/part02 payload_parts/part03 payload_parts/part04 payload_parts/part05 payload_parts/part06 payload_parts/part07 > ParkingLocationApp_payload.b64
          {
            echo "files:"
            ls -l payload_parts
            echo "base64 size and sha:"
            wc -c ParkingLocationApp_payload.b64
            sha256sum ParkingLocationApp_payload.b64
            echo "decode:"
            base64 --decode ParkingLocationApp_payload.b64 > ParkingLocationApp_payload.tar.gz
            echo "decode_exit=$?"
            echo "tar size and sha:"
            wc -c ParkingLocationApp_payload.tar.gz
            sha256sum ParkingLocationApp_payload.tar.gz
            echo "gzip test:"
            gzip -t ParkingLocationApp_payload.tar.gz
            echo "gzip_exit=$?"
            echo "tar list:"
            tar -tzf ParkingLocationApp_payload.tar.gz | head -30
            echo "tar_exit=${PIPESTATUS[0]}"
          } | tee payload-diagnostic.txt
          exit 0

      - name: Upload payload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: payload-diagnostics
          path: |
            ParkingLocationApp_payload.b64
            ParkingLocationApp_payload.tar.gz
            payload-diagnostic.txt
          if-no-files-found: error
          retention-days: 3
