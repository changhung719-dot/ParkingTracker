name: Build ParkingLocation APK

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Restore generated Android project
        run: |
          cat payload_parts/part* > ParkingLocationApp_payload.b64
          base64 --decode ParkingLocationApp_payload.b64 > ParkingLocationApp_payload.tar.gz
          tar -xzf ParkingLocationApp_payload.tar.gz
          test -f ParkingLocationPayload/settings.gradle
          test -f ParkingLocationPayload/app/build.gradle

      - name: Build installable release APK
        working-directory: ParkingLocationPayload
        run: gradle --no-daemon clean assembleRelease

      - name: Verify APK
        run: |
          test -f ParkingLocationPayload/app/build/outputs/apk/release/app-release.apk
          unzip -t ParkingLocationPayload/app/build/outputs/apk/release/app-release.apk
          sha256sum ParkingLocationPayload/app/build/outputs/apk/release/app-release.apk

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: ParkingLocation-apk
          path: ParkingLocationPayload/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 30
